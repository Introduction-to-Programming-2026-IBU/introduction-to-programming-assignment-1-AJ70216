{% extends "layout.html" %}

{% block body %}

<h1 class="mb-4">Grade Prediction Calculator</h1>

<div class="card shadow-sm">
    <div class="card-body">
        <form action="/predict" method="post">
            <div class="mb-3">
                <label class="form-label">Current Score</label>
                <input class="form-control" name="current_score" type="number" step="0.01" placeholder="Example: 85" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Current Weight (%)</label>
                <input class="form-control" name="current_weight" type="number" step="0.01" placeholder="Example: 60" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Final Exam Weight (%)</label>
                <input class="form-control" name="final_weight" type="number" step="0.01" placeholder="Example: 40" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Desired Final Grade</label>
                <input class="form-control" name="desired_grade" type="number" step="0.01" placeholder="Example: 90" required>
            </div>

            <button class="btn btn-primary" type="submit">Calculate</button>
        </form>

        {% if message %}
             <div class="alert alert-info mt-4">
                 {{ message }}
             </div>
        {% endif %}
    </div>
</div>

{% endblock %}
